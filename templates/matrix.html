<!DOCTYPE html>
<html>

<head>

<title>Security Presence Matrix</title>

<style>

body{
background:#2f3136;
font-family:Arial;
color:white;
margin:0;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

button{
background:#4CAF50;
border:none;
color:white;
padding:10px 16px;
font-size:14px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

iframe{
width:100%;
height:88vh;
border:none;
display:none;
background:white;
}

#loader{
text-align:center;
padding-top:200px;
font-size:20px;
}

.spinner{
border:6px solid #f3f3f3;
border-top:6px solid #3498db;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="topbar">
<h2>Security Presence Matrix</h2>

<button onclick="downloadFile()">Download CSV</button>
</div>

<div id="loader">
<div class="spinner"></div>
<br>
Loading Matrix...
</div>

<iframe id="excelFrame" src="/view_matrix_file"></iframe>

<script>

function downloadFile(){
    window.location="/download_matrix"
}

let frame = document.getElementById("excelFrame")

frame.onload = function(){
    document.getElementById("loader").style.display="none"
    frame.style.display="block"
}

</script>

</body>
</html>
